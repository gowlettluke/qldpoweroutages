name: Poll QLD power outages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qld-power-outage-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run outage pipeline
        run: |
          python qld_power_outage_pipeline.py --output-dir data --debug

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --rebase --autostash origin main

          git add data/*.csv data/*.geojson data/*.json

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update outage data"
            git push
          fi
